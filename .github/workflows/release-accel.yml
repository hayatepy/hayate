name: Release accel

on:
  push:
    tags: ["accel-v*"]
  workflow_dispatch:

jobs:
  wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-latest
          # Intel macs are cross-compiled: the x86_64 hosted runners retired.
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: accel
          command: build
          args: --release -o dist
          target: ${{ matrix.target || '' }}
          manylinux: auto
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target || 'native' }}
          path: accel/dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: accel
          command: sdist
          args: -o dist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: accel/dist/*.tar.gz

  # PyPI Trusted Publishing for the "hayate-accel" project:
  #   owner: hayatepy, repo: hayate, workflow: release-accel.yml, environment: pypi
  publish:
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
